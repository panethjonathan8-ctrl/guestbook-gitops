{{- if .Values.githubSSO.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-github-oauth
  namespace: monitoring
spec:
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    # Owner (not Merge): this is its own Secret, separate from the chart's
    # auto-generated "kube-prometheus-stack-grafana" admin-password Secret.
    # Grafana reads both via envFromSecret without conflict.
    name: grafana-github-oauth
    creationPolicy: Owner
  data:
    - secretKey: GF_AUTH_GITHUB_CLIENT_ID
      remoteRef:
        key: {{ .Values.githubSSO.secretsManagerKey | quote }}
        property: client_id
    - secretKey: GF_AUTH_GITHUB_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.githubSSO.secretsManagerKey | quote }}
        property: client_secret
{{- end }}
