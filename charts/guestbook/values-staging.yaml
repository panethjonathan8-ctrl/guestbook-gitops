replicaCount: 2

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 3

pdb:
  minAvailable: 1
  enabled: true

image:
  repository: "400013494612.dkr.ecr.eu-west-1.amazonaws.com/guestbook"
  tag: "966e0fa"

env:
  ENV_NAME: staging
  ENV_COLOR: "#FFC107"   # yellow

ingress:
  host: staging.guestbook.example.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

externalSecret:
  enabled: true
  remoteSecretName: guestbook/staging/db-secret

resourceQuota:
  hard:
    # Sized for HPA maxReplicas (3 pods):
    # requests: 3 × 100m cpu, 3 × 128Mi memory
    # limits:   3 × 500m cpu, 3 × 512Mi memory
    requests.cpu: "500m"
    requests.memory: "500Mi"
    limits.cpu: "2"
    limits.memory: "2Gi"
    pods: "6"
