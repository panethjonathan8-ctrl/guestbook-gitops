replicaCount: 3

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 8

pdb:
  enabled: true
  minAvailable: 2

image:
  repository: "400013494612.dkr.ecr.eu-west-1.amazonaws.com/guestbook"
  tag: "2bed281"

env:
  ENV_NAME: production
  ENV_COLOR: "#F44336"   # red

ingress:
  host: guestbook.example.com

# Tighter resource limits reflect production discipline.
# Requests are higher to guarantee the pod gets what it needs.
# Limits are higher to absorb traffic spikes without OOMKill.
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

persistence:
  enabled: false

externalSecret:
  enabled: true
  remoteSecretName: guestbook/prod/db-secret

resourceQuota:
  hard:
    # Sized for HPA maxReplicas (8 pods):
    # requests: 8 × 200m cpu, 8 × 256Mi memory
    # limits:   8 × 1000m cpu, 8 × 512Mi memory
    requests.cpu: "2"
    requests.memory: "2100Mi"
    limits.cpu: "9"
    limits.memory: "4200Mi"
    pods: "15"
