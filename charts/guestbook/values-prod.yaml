replicaCount: 3

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 5

pdb:
  enabled: true
  minAvailable: 2

image:
  repository: "400013494612.dkr.ecr.eu-west-1.amazonaws.com/guestbook"
  tag: "1.2.0"

env:
  ENV_NAME: production
  ENV_COLOR: "#F44336"   # red

ingress:
  host: www.guestbookinterview.lol

# Tighter resource limits reflect production discipline.
# Requests are higher to guarantee the pod gets what it needs.
# Limits are higher to absorb traffic spikes without OOMKill.
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

persistence:
  enabled: false

externalSecret:
  enabled: true
  remoteSecretName: guestbook/prod/db-secret

resourceQuota:
  hard:
    # Sized for HPA maxReplicas (5 pods) on 2 nodes.
    # Raise maxReplicas to 8 and pods to 15 when prod runs on 3 nodes.
    # requests: 5 × 200m cpu, 5 × 256Mi memory
    # limits:   5 × 1000m cpu, 5 × 512Mi memory
    requests.cpu: "1200m"
    requests.memory: "1400Mi"
    limits.cpu: "6"
    limits.memory: "3Gi"
    pods: "8"
