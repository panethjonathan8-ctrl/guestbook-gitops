apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "guestbook.fullname" . }}-config
  labels:
    {{- include "guestbook.labels" . | nindent 4 }}
data:
  # Non-secret environment configuration.
  # The Deployment reads these via envFrom/configMapKeyRef — they never
  # appear in the pod spec as plain values, keeping the Deployment template
  # generic across all environments.
  ENV_NAME: {{ .Values.env.ENV_NAME | quote }}
  ENV_COLOR: {{ .Values.env.ENV_COLOR | quote }}
