{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "guestbook.fullname" . }}
  labels:
    {{- include "guestbook.labels" . | nindent 4 }}
spec:
  # At least this many pods must remain available during a voluntary disruption
  # (node drain, cluster upgrade). Kubernetes will evict pods one at a time,
  # waiting for a replacement to pass its readinessProbe before continuing.
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "guestbook.selectorLabels" . | nindent 6 }}
{{- end }}
