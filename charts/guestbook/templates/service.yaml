apiVersion: v1
kind: Service
metadata:
  name: {{ include "guestbook.fullname" . }}
  labels:
    {{- include "guestbook.labels" . | nindent 4 }}
spec:
  # ClusterIP = internal-only address. NGINX routes to this Service.
  # Nothing outside the cluster can reach this directly —
  # all external traffic enters through the ALB → NGINX path.
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "guestbook.selectorLabels" . | nindent 4 }}
