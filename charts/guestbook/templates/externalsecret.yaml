{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "guestbook.fullname" . }}-secret
  labels:
    {{- include "guestbook.labels" . | nindent 4 }}
spec:
  # How often ESO re-reads the value from AWS Secrets Manager.
  # If the secret rotates in AWS, the pod picks up the new value
  # within this interval without a restart.
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}

  secretStoreRef:
    # ClusterSecretStore is cluster-scoped — one store serves all namespaces.
    # Installed and configured by the addons Terragrunt module.
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind }}

  target:
    # The Kubernetes Secret ESO creates in this namespace.
    # The Deployment reads DB_SECRET from this Secret.
    name: {{ .Values.externalSecret.targetSecretName }}
    creationPolicy: Owner

  data:
    - secretKey: password
      remoteRef:
        # Path in AWS Secrets Manager — differs per environment.
        # e.g. guestbook/dev/db-secret → { "password": "..." }
        key: {{ .Values.externalSecret.remoteSecretName }}
        property: password
{{- end }}
