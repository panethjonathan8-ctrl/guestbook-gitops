{{- if .Values.grafana.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: {{ .Values.grafana.namespace }}
  annotations:
    # This Ingress has no AWS-managed load balancer of its own — the ALB is
    # owned by the nginx-alb Ingress (ingress.yaml), which forwards every
    # Host to the NGINX Ingress Controller. NGINX reads this object (class:
    # nginx) to decide that requests for this specific host get sent to
    # Grafana instead of any other backend. Same pattern as argocd-ingress.yaml.
    {{- with .Values.grafana.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.grafana.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.grafana.serviceName }}
                port:
                  number: {{ .Values.grafana.servicePort }}
{{- end }}
