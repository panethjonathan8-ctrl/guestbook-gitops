apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-alb
  namespace: {{ .Values.nginxNamespace }}
  annotations:
    # internet-facing: ALB gets a public IP. Use "internal" for private ALBs.
    alb.ingress.kubernetes.io/scheme: internet-facing

    # target-type: ip — ALB targets NGINX pod IPs directly via VPC routing.
    # No NodePort hop. LBC auto-manages the SG rule that allows ALB → NGINX pods.
    alb.ingress.kubernetes.io/target-type: ip

    # HTTP stays open for apps that don't have a real cert-covered hostname
    # yet. HTTPS is added once a certificateArn is supplied (prod, once the
    # ACM wildcard cert from infrastructure/modules/dns is issued) — needed
    # for ArgoCD's GitHub OAuth login, since GitHub requires an HTTPS
    # callback URL.
    #
    # Once HTTPS is available, HTTP is redirected to it (see the ssl-redirect
    # action below and its matching rule) rather than left open side by side.
    # issue #108: a plain-HTTP hit on ArgoCD's login page built a return_url
    # with scheme "http", which didn't match ArgoCD's own configured base URL
    # (always "https://", see infrastructure/modules/argocd/main.tf) and
    # failed with "Invalid redirect URL: the protocol and host ... must
    # match". Redirecting at the ALB means the browser is never actually on
    # http:// by the time it reaches any app, so this mismatch can't recur.
    {{- if .Values.certificateArn }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.certificateArn | quote }}

    # Defines a synthetic "action" backend (not a real Service) that LBC
    # translates into a native ALB redirect rule — no request ever reaches
    # NGINX for this action, the ALB answers 301 directly. Applies only to
    # the HTTP:80 listener; the HTTPS:443 listener keeps its normal rule
    # below, so there's no redirect loop.
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type":"redirect","RedirectConfig":{"Protocol":"HTTPS","Port":"443","StatusCode":"HTTP_301"}}'
    {{- else }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    {{- end }}

    # /healthz is the NGINX liveness endpoint — faster convergence than /.
    alb.ingress.kubernetes.io/healthcheck-path: /healthz

    # Tags visible in the AWS console so you can identify which cluster owns this ALB.
    alb.ingress.kubernetes.io/tags: "Project=guestbook,Environment={{ .Values.envName }},ManagedBy=argocd"

    {{- if .Values.dnsHostnames }}
    # This Ingress has no per-host rules below (it's a catch-all that forwards
    # every Host to NGINX, which does the real host-based routing via its own
    # separate Ingress objects — see argocd-ingress.yaml). Because of that,
    # external-dns has nothing in spec.rules to read a hostname from, even
    # though this is the one Ingress object that actually gets the ALB's real
    # address written to its status by AWS LBC. This annotation tells
    # external-dns "create a record for this hostname, pointed at this
    # object's load balancer" without needing a matching spec.rules entry.
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.dnsHostnames | join "," | quote }}
    {{- end }}
spec:
  # ingressClassName: alb tells AWS LBC (not NGINX) to reconcile this Ingress.
  ingressClassName: alb
  rules:
    - http:
        paths:
          {{- if .Values.certificateArn }}
          # Matched first (ALB evaluates rules in order): every request
          # this Ingress receives is routed to the ssl-redirect action
          # above. LBC only ever applies this action's ALB rule to the
          # HTTP:80 listener — the HTTPS:443 listener falls through to the
          # real backend rule below instead, so there's no redirect loop.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ssl-redirect
                port:
                  name: use-annotation
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.nginxServiceName }}
                port:
                  number: {{ .Values.nginxServicePort }}
