# The environment name is used for the ALB tag so you can identify it in the AWS console.
envName: ""

# Namespace where the NGINX Ingress Controller is installed.
nginxNamespace: ingress-nginx

# Name of the NGINX controller Service — created automatically by the ingress-nginx Helm chart.
nginxServiceName: ingress-nginx-controller

# Port the NGINX controller Service listens on.
nginxServicePort: 80

# ARN of the ACM certificate the shared ALB should terminate TLS with.
# Empty string keeps the ALB HTTP-only (dev default). Set in prod once the
# wildcard cert from infrastructure/modules/dns is issued — see issue #53.
certificateArn: ""

# Hostnames external-dns should create Route 53 records for, pointed at this
# ALB. Empty by default. See ingress.yaml for why this lives on the ALB
# Ingress rather than on each app's own NGINX-class Ingress.
dnsHostnames: []

# ArgoCD Ingress — disabled by default (dev doesn't get a public ArgoCD URL,
# see issue #53's prod-only scoping decision).
argocd:
  enabled: false
  namespace: argocd
  host: ""
  serviceName: argocd-server
  servicePort: 80
  annotations: {}

# Grafana Ingress — disabled by default (dev doesn't get a public Grafana
# URL, same prod-only scoping decision as ArgoCD above). See issue #54.
grafana:
  enabled: false
  namespace: monitoring
  host: ""
  serviceName: kube-prometheus-stack-grafana
  servicePort: 80
  annotations: {}
