gitopsRepoUrl: https://github.com/panethjonathan8-ctrl/guestbook-gitops.git
gitopsRepoBranch: main

# The prod cluster is single-purpose — only the prod namespace runs here.
applications:
  - name: guestbook-prod
    env: prod
    namespace: prod

# Cluster-level apps — see values-dev.yaml for explanation.
clusterApps:
  - name: cluster-ingress-prod
    env: prod
    chartPath: charts/cluster-ingress
    namespace: ingress-nginx

  # ── Observability stack — mirrors dev config (emptyDir storage for now).
  # When prod runs on 3 nodes with the EBS CSI driver, update values-prod.yaml
  # inside each chart to use a PersistentVolumeClaim instead of emptyDir.
  - name: kube-prometheus-stack
    env: prod
    chartPath: charts/kube-prometheus-stack
    namespace: monitoring
    extraSyncOptions:
      - ServerSideApply=true

  - name: loki
    env: prod
    chartPath: charts/loki
    namespace: monitoring

  - name: alloy
    env: prod
    chartPath: charts/alloy
    namespace: monitoring
